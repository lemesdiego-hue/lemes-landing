<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Lemes Advogados</title>
<script>
/*
 Fallback de rotas para GitHub Pages.
 O GitHub Pages serve "/trabalhista" a partir de "trabalhista.html" automaticamente,
 mantendo a URL limpa. Este 404 é a rede de segurança: se uma rota limpa não
 resolver (ex.: barra final ou refresh em ambiente que não faça a resolução
 sem extensão), redireciona para o arquivo correto. Rotas desconhecidas -> home.
*/
(function(){
 "use strict";
 var known = {trabalhista:1,civel:1,divorcio:1,inventario:1,aereo:1,previdenciario:1};
 var seg = location.pathname
   .replace(/\.html$/i,"")
   .replace(/^\/+|\/+$/g,"")
   .split("/").pop()
   .toLowerCase();
 if (Object.prototype.hasOwnProperty.call(known, seg)) {
  location.replace("/" + seg + ".html" + location.search + location.hash);
 } else {
  location.replace("/");
 }
})();
</script>
<style>
 body{margin:0;min-height:100vh;display:grid;place-items:center;background:#ECE9E1;color:#1B2420;
  font-family:"Spectral",Georgia,serif;text-align:center;padding:2rem;line-height:1.6}
 a{color:#2E6B52;font-weight:700}
</style>
</head>
<body>
 <div>
  <p>Redirecionando…</p>
  <p>Se nada acontecer, <a href="/">voltar para a página inicial</a>.</p>
 </div>
</body>
</html>
